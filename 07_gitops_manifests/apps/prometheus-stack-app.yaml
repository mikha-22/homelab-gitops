apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: '45.28.0' 
    helm:
      values: |
        # CORRECTED: This block now correctly defines ALL data sources.
        grafana:
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
            - name: Prometheus
              type: prometheus
              url: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
              access: proxy
              isDefault: true
            - name: Alertmanager
              type: alertmanager
              url: http://prometheus-stack-kube-prom-alertmanager.monitoring.svc.cluster.local:9093
              access: proxy
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    helm:
      values: |
        # Minimal configuration for filesystem storage
        deploymentMode: SingleBinary
        
        loki:
          auth_enabled: false
          storage:
            type: 'filesystem'
            
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: "local-path"
            size: 10Gi
            
        # Enable log collection
        promtail:
          enabled: true
          
        # Simple gateway for ingress
        gateway:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - host: loki.milenika.dev
                paths:
                  - path: /
                    pathType: Prefix
            annotations:
              external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

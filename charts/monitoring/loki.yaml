apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    helm:
      values: |
        promtail:
          enabled: true

        loki:
          auth_enabled: false
          
          # ===================================================================
          #  START: ADDED STORAGE CONFIGURATION
          #  This block tells Loki to request a 10Gi volume from the
          #  cluster's default storage provider to store logs.
          # ===================================================================
          storage:
            type: 'filesystem'
            filesystem:
              persistentVolumeClaim:
                enabled: true
                storageClassName: "local-path" # This is the default in K3s
                size: 10Gi
          # ===================================================================
          #  END: ADDED STORAGE CONFIGURATION
          # ===================================================================

        ingress:
          enabled: true
          ingressClassName: traefik
          hosts:
            - host: loki.milenika.dev
              paths:
                - path: /
                  pathType: Prefix
          annotations:
            external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
            external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

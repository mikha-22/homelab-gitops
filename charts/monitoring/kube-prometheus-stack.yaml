# ===================================================================
# UPDATED KUBE-PROMETHEUS-STACK - LATEST VERSION & BEST PRACTICES
# ===================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.9.0  # Latest version (updated from 75.8.0)
    helm:
      values: |
        # ====================
        # PROMETHEUS CONFIGURATION
        # ====================
        prometheus:
          prometheusSpec:
            # Resource management for homelab
            resources:
              requests:
                memory: "2Gi"
                cpu: "500m"
              limits:
                memory: "4Gi"
                cpu: "2"
            
            # Retention and storage
            retention: 30d
            retentionSize: "50GB"
            
            # Storage configuration for persistent data
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"  # K3s default
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
          
          # Ingress for Prometheus
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - "prometheus.milenika.dev"
            annotations:
              external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
              # Security headers
              traefik.ingress.kubernetes.io/router.middlewares: "monitoring-auth@kubernetescrd"

        # ====================
        # GRAFANA CONFIGURATION  
        # ====================
        grafana:
          # Admin credentials (consider using secrets in production)
          adminPassword: "admin123"  # Change this!
          
          # Persistence for dashboards and settings
          persistence:
            enabled: true
            storageClassName: "local-path"
            size: 10Gi
          
          # Resource management
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          # Ingress configuration
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - "grafana.milenika.dev"
            annotations:
              external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          
          # Additional data sources
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-gateway.monitoring.svc.cluster.local
              access: proxy
              isDefault: false

        # ====================
        # ALERTMANAGER CONFIGURATION
        # ====================
        alertmanager:
          alertmanagerSpec:
            # Storage for alertmanager data
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
          
          # Basic webhook configuration (customize for your needs)
          config:
            global:
              smtp_smarthost: 'localhost:587'
              smtp_from: 'alertmanager@milenika.dev'
            route:
              group_by: ['alertname']
              group_wait: 10s
              group_interval: 10s
              repeat_interval: 1h
              receiver: 'web.hook'
            receivers:
            - name: 'web.hook'
              webhook_configs:
              - url: 'http://127.0.0.1:5001/'

        # ====================
        # NODE EXPORTER CONFIGURATION
        # ====================
        nodeExporter:
          enabled: true
          
        # ====================
        # KUBE-STATE-METRICS CONFIGURATION  
        # ====================
        kubeStateMetrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Better for CRDs

---
# ===================================================================
# UPDATED LOKI CONFIGURATION - PRODUCTION READY
# ===================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1  # Latest version confirmed
    helm:
      values: |
        # ====================
        # DEPLOYMENT MODE
        # ====================
        # Using SingleBinary mode for homelab (simpler)
        deploymentMode: SingleBinary
        
        # ====================
        # LOKI CONFIGURATION
        # ====================
        loki:
          auth_enabled: false
          
          # Common configuration
          commonConfig:
            replication_factor: 1
            
          # Storage configuration  
          storage:
            type: 'filesystem'
            
          # Schema configuration
          schemaConfig:
            configs:
              - from: 2024-01-01  # Updated date
                store: tsdb
                object_store: filesystem
                schema: v13  # Latest schema
                index:
                  prefix: index_
                  period: 24h

        # ====================
        # SINGLE BINARY DEPLOYMENT
        # ====================
        singleBinary:
          replicas: 1
          
          # Persistence for logs
          persistence:
            enabled: true
            storageClass: "local-path"
            size: 20Gi  # Increased for more logs
            
          # Resource management
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"

        # ====================
        # LOG COLLECTION WITH PROMTAIL
        # ====================
        promtail:
          enabled: true
          config:
            # Enhanced log collection
            clients:
              - url: http://loki-gateway:80/loki/api/v1/push
                tenant_id: 1
                
        # ====================
        # GATEWAY CONFIGURATION
        # ====================
        gateway:
          enabled: true
          replicas: 1
          
          # Ingress configuration
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - host: loki.milenika.dev
                paths:
                  - path: /
                    pathType: Prefix
            annotations:
              external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"

        # ====================
        # DISABLE UNUSED COMPONENTS  
        # ====================
        # These are automatically disabled in SingleBinary mode
        ingester:
          enabled: false
        distributor:
          enabled: false
        querier:
          enabled: false
        queryFrontend:
          enabled: false
        queryScheduler:
          enabled: false
        compactor:
          enabled: false
        indexGateway:
          enabled: false
        ruler:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# ===================================================================
# MONITORING NAMESPACE WITH BETTER RESOURCE MANAGEMENT
# ===================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # GitOps labels for better organization
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: monitoring-stack
  annotations:
    # Resource quotas for the namespace (optional)
    scheduler.alpha.kubernetes.io/node-selector: ""

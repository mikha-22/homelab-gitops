apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: "2bbf5d90-ccf2-4f7b-b23e-0ddcc80a45b9.cfargotunnel.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  # --- ADD THIS LINE ---
  # This explicitly tells K3s that Traefik should handle this Ingress.
  ingressClassName: traefik
  rules:
  - host: argocd.milenika.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              # This confirms we are connecting to the server's plain HTTP port.
              number: 80

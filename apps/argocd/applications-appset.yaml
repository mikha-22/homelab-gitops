apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/mikha-22/homelab-gitops
        revision: HEAD
        directories:
          - path: apps/*
          - exclude: true
            path: apps/argocd # Exclude this directory to prevent recursion
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: '{{path.basename}}'
      source:
        repoURL: https://github.com/mikha-22/homelab-gitops
        targetRevision: HEAD
        path: '{{path}}/homelab' # Point to the overlay with the values
        kustomize: {} # Process the kustomization.yaml in the target directory
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true]

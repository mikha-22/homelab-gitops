# FILE: apps/argocd/applications-appset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/mikha-22/homelab-gitops
        revision: HEAD
        directories:
          - path: apps/*
          - exclude: true
            path: apps/argocd # Exclude this directory to prevent recursion
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: homelab-gitops
    spec:
      project: '{{path.basename}}'
      source:
        repoURL: https://github.com/mikha-22/homelab-gitops
        targetRevision: HEAD
        path: '{{path}}/homelab' # This resolves to 'apps/monitoring/homelab'
        
        # Kustomize configuration with Helm support
        kustomize:
          # Enable Helm chart processing within Kustomize
          helmEnabled: true
          # Build options for better compatibility
          buildOptions: --load-restrictor LoadRestrictionsNone
          
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
        
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ApplyOutOfSyncOnly=true
        
        # Retry configuration for better reliability
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
            
      # Health check configuration
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP

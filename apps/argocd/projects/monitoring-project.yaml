apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Project for the homelab monitoring stack
  sourceRepos:
    - '*' # Allow all source repos for flexibility in a homelab
  destinations:
    # 1. Allow deploying the monitoring stack resources (Prometheus, Grafana) into the 'monitoring' namespace
    - namespace: monitoring
      server: https://kubernetes.default.svc
    # 2. (This is the fix) Allow the parent 'monitoring' app to create the child Application resources in the 'argocd' namespace
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*' # Allow creation of cluster-level resources

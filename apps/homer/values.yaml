# Homer Helm Chart Values
# Based on official djjudas21/homer chart

# Image configuration
image:
  repository: b4bz/homer
  tag: ""  # Uses chart default
  pullPolicy: IfNotPresent

# Service configuration
service:
  main:
    ports:
      http:
        port: 8080

# Ingress configuration for external access
ingress:
  main:
    enabled: true
    ingressClassName: traefik
    annotations:
      external-dns.alpha.kubernetes.io/target: "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: homer.milenika.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: homer-tls
        hosts:
          - homer.milenika.dev

# Persistence for assets (configs, icons, etc.)
persistence:
  assets:
    enabled: true
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /www/assets

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Homer configuration
config: |
  ---
  # Homepage configuration
  title: "Mikha's Homelab"
  subtitle: "LGTM Stack & Services"
  logo: "logo.png"
  
  header: true
  footer: '<p>Built with <span class="has-text-danger">❤️</span> using <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a></p>'
  
  # Theme
  theme: default
  colors:
    light:
      highlight-primary: "#3367d6"
      highlight-secondary: "#4285f4"
      highlight-hover: "#5a95f5"
      background: "#f5f5f5"
      card-background: "#ffffff"
      text: "#363636"
      text-header: "#ffffff"
      text-title: "#303030"
      text-subtitle: "#424242"
      card-shadow: rgba(0, 0, 0, 0.1)
      link: "#3273dc"
      link-hover: "#363636"
    dark:
      highlight-primary: "#3367d6"
      highlight-secondary: "#4285f4"
      highlight-hover: "#5a95f5"
      background: "#131313"
      card-background: "#2b2b2b"
      text: "#eaeaea"
      text-header: "#ffffff"
      text-title: "#fafafa"
      text-subtitle: "#f5f5f5"
      card-shadow: rgba(0, 0, 0, 0.4)
      link: "#3273dc"
      link-hover: "#ffdd57"
  
  # Services
  services:
    - name: "Monitoring & Observability"
      icon: "fas fa-chart-line"
      items:
        - name: "Grafana"
          logo: "https://grafana.com/static/img/menu/grafana2.svg"
          subtitle: "Metrics, Logs & Traces Visualization"
          tag: "LGTM"
          url: "https://grafana.milenika.dev"
          target: "_blank"
        - name: "Prometheus"
          logo: "https://prometheus.io/assets/prometheus_logo_grey.svg"
          subtitle: "Metrics Collection & Alerting"
          tag: "metrics"
          url: "https://prometheus.milenika.dev"
          target: "_blank"
        - name: "Loki"
          logo: "https://grafana.com/static/img/logos/logo-loki.svg"
          subtitle: "Log Aggregation"
          tag: "logs"
          url: "https://loki.milenika.dev"
          target: "_blank"
        - name: "Tempo"
          logo: "https://grafana.com/static/img/logos/logo-tempo.svg"
          subtitle: "Distributed Tracing"
          tag: "traces"
          url: "https://tempo.milenika.dev"
          target: "_blank"
    
    - name: "Infrastructure"
      icon: "fas fa-server"
      items:
        - name: "ArgoCD"
          logo: "https://argo-cd.readthedocs.io/en/stable/assets/logo.png"
          subtitle: "GitOps Continuous Delivery"
          tag: "gitops"
          url: "https://argocd.milenika.dev"
          target: "_blank"
        - name: "Homer Dashboard"
          logo: "https://github.com/bastienwirtz/homer/raw/main/public/logo.png"
          subtitle: "This Homepage"
          tag: "dashboard"
          url: "https://homer.milenika.dev"
          target: "_blank"
  
  # Welcome message
  message:
    style: "is-dark"
    title: "Welcome to Mikha's Homelab!"
    icon: "fa fa-grin"
    content: "This dashboard provides quick access to all your homelab services. Your LGTM observability stack is fully operational with Loki (logs), Grafana (visualization), Tempo (traces), and Prometheus (metrics)."

# Environment variables (optional)
env:
  TZ: "Asia/Jakarta"

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Homer Dashboard Configuration
image:
  repository: b4bz/homer
  tag: latest
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  storageClass: local-path
  size: 1Gi

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: homer.milenika.dev
      paths:
        - path: /
          pathType: Prefix
  annotations:
    external-dns.alpha.kubernetes.io/target: "eb69efc6-2d0f-424d-a170-53a8c30c65b7.cfargotunnel.com" # <-- UPDATED
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - secretName: homer-tls
      hosts:
        - homer.milenika.dev

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Homer configuration
configmap:
  config:
    enabled: true
    data:
      config.yml: |
        ---
        title: "Homelab Dashboard"
        subtitle: "GitOps Monitoring Stack Demo"
        logo: "logo.png"
        header: true
        footer: '<p>Created with <span class="has-text-danger">❤️</span> | <a href="https://github.com/mikha-22/homelab-gitops">View on GitHub</a></p>'
        
        # Optional theme customization
        theme: default
        colors:
          light:
            highlight-primary: "#3367d6"
            highlight-secondary: "#4285f4"
            highlight-hover: "#5a95f5"
            background: "#f5f5f5"
            card-background: "#ffffff"
            text: "#363636"
            text-header: "#ffffff"
            text-title: "#303030"
            text-subtitle: "#424242"
            card-shadow: rgba(0, 0, 0, 0.1)
            link: "#3273dc"
            link-hover: "#363636"
          dark:
            highlight-primary: "#3367d6"
            highlight-secondary: "#4285f4"
            highlight-hover: "#5a95f5"
            background: "#131313"
            card-background: "#2b2b2b"
            text: "#eaeaea"
            text-header: "#ffffff"
            text-title: "#fafafa"
            text-subtitle: "#f5f5f5"
            card-shadow: rgba(0, 0, 0, 0.4)
            link: "#3273dc"
            link-hover: "#ffdd57"
        
        # Optional message
        message:
          style: "is-info"
          title: "Demo Access Available!"
          icon: "fa fa-info-circle"
          content: "All services are configured with anonymous read-only access. No login required to explore our monitoring stack!"
        
        # Services
        services:
          - name: "Monitoring & Observability"
            icon: "fas fa-chart-line"
            items:
              - name: "Grafana"
                logo: "assets/tools/grafana.png"
                subtitle: "Metrics & Dashboards (Anonymous Viewer Access)"
                tag: "monitoring"
                keywords: "metrics visualization dashboards"
                url: "https://grafana.milenika.dev"
                target: "_blank"
                tagstyle: "is-success"
                
              - name: "Prometheus"
                logo: "https://prometheus.io/assets/prometheus_logo_grey.svg"
                subtitle: "Metrics Collection & Alerting"
                tag: "metrics"
                url: "https://prometheus.milenika.dev"
                target: "_blank"
                tagstyle: "is-warning"
                
              - name: "Loki"
                logo: "https://grafana.com/static/img/logos/logo-loki.svg"
                subtitle: "Log Aggregation"
                tag: "logs"
                url: "https://loki.milenika.dev"
                target: "_blank"
                tagstyle: "is-info"
                
              - name: "Tempo"
                logo: "https://grafana.com/static/img/logos/logo-tempo.svg"
                subtitle: "Distributed Tracing"
                tag: "traces"
                url: "https://tempo.milenika.dev"
                target: "_blank"
                tagstyle: "is-primary"
          
          - name: "GitOps & Deployment"
            icon: "fas fa-code-branch"
            items:
              - name: "ArgoCD"
                logo: "assets/tools/argocd.png"
                subtitle: "GitOps Deployment (Anonymous Read-Only Access)"
                tag: "gitops"
                keywords: "gitops kubernetes deployment"
                url: "https://argocd.milenika.dev"
                target: "_blank"
              - name: "Homer Dashboard"
                logo: "https://github.com/bastienwirtz/homer/raw/main/public/logo.png"
                subtitle: "This Homepage"
                tag: "dashboard"
                url: "https://homer.milenika.dev"
                target: "_blank"
        
        # Welcome message
        message:
          style: "is-dark"
          title: "Welcome to Mikha's Homelab!"
          icon: "fa fa-grin"
          content: "This dashboard provides quick access to all your homelab services. Your LGTM observability stack is fully operational with Loki (logs), Grafana (visualization), Tempo (traces), and Prometheus (metrics)."

#
# IMPORTANT NOTE
#
# This chart inherits from bjw-s common library chart. You can check the default values/options here:
# https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
#

# Image configuration
image:
  repository: b4bz/homer
  tag: ""  # Uses chart default
  pullPolicy: IfNotPresent

# Environment variables
env:
  TZ: "Asia/Jakarta"

# Service configuration
service:
  main:
    ports:
      http:
        port: 8080

# Ingress configuration - MATCH YOUR WORKING PATTERN
ingress:
  main:
    enabled: true
    # REMOVE className, use annotation instead like your other apps
    annotations:
      "kubernetes.io/ingress.class": "traefik"  # MATCH your working pattern
      "external-dns.alpha.kubernetes.io/target": "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
    hosts:
      - host: homer.milenika.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: homer-tls
        hosts:
          - homer.milenika.dev

# Security context
securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  runAsGroup: 1000

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Persistence for assets (configs, icons, etc.)
persistence:
  config:
    enabled: true
    type: pvc
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /www/assets

# ConfigMap for Homer configuration
configmap:
  config:
    enabled: true
    data:
      config.yml: |
        ---
        # Homepage configuration
        title: "Mikha's Homelab"
        subtitle: "LGTM Stack & Services"
        logo: "logo.png"
        
        header: true
        footer: '<p>Built with <span class="has-text-danger">❤️</span> using <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a></p>'
        
        # Theme
        theme: default
        colors:
          light:
            highlight-primary: "#3367d6"
            highlight-secondary: "#4285f4"
            highlight-hover: "#5a95f5"
            background: "#f5f5f5"
            card-background: "#ffffff"
            text: "#363636"
            text-header: "#ffffff"
            text-title: "#303030"
            text-subtitle: "#424242"
            card-shadow: rgba(0, 0, 0, 0.1)
            link: "#3273dc"
            link-hover: "#363636"
          dark:
            highlight-primary: "#3367d6"
            highlight-secondary: "#4285f4"
            highlight-hover: "#5a95f5"
            background: "#131313"
            card-background: "#2b2b2b"
            text: "#eaeaea"
            text-header: "#ffffff"
            text-title: "#fafafa"
            text-subtitle: "#f5f5f5"
            card-shadow: rgba(0, 0, 0, 0.4)
            link: "#3273dc"
            link-hover: "#ffdd57"
        
        # Services
        services:
          - name: "Monitoring & Observability"
            icon: "fas fa-chart-line"
            items:
              - name: "Grafana"
                logo: "https://grafana.com/static/img/menu/grafana2.svg"
                subtitle: "Metrics, Logs & Traces Visualization"
                tag: "LGTM"
                url: "https://grafana.milenika.dev"
                target: "_blank"
              - name: "Prometheus"
                logo: "https://raw.githubusercontent.com/prometheus/prometheus.github.io/master/assets/prometheus_logo-cb55bb5c346.png"
                subtitle: "Metrics Collection • View in Grafana"
                tag: "metrics"
                url: "https://grafana.milenika.dev/explore"
                target: "_blank"
              - name: "Loki"
                logo: "https://grafana.com/static/img/logos/logo-loki.svg"
                subtitle: "Log Aggregation • View in Grafana"
                tag: "logs"
                url: "https://grafana.milenika.dev/explore"
                target: "_blank"
              - name: "Tempo"
                logo: "https://grafana.com/static/assets/img/logos/grafana-tempo.svg"
                subtitle: "Distributed Tracing • View in Grafana"
                tag: "traces"
                url: "https://grafana.milenika.dev/explore"
                target: "_blank"
          
          - name: "Infrastructure"
            icon: "fas fa-server"
            items:
              - name: "ArgoCD"
                logo: "https://argo-cd.readthedocs.io/en/stable/assets/logo.png"
                subtitle: "GitOps Continuous Delivery"
                tag: "gitops"
                url: "https://demo:homelab-readonly@argocd.milenika.dev"
                target: "_blank"
              - name: "Homer Dashboard"
                logo: "https://github.com/bastienwirtz/homer/raw/main/public/logo.png"
                subtitle: "This Homepage"
                tag: "dashboard"
                url: "https://homer.milenika.dev"
                target: "_blank"
              - name: "Homelab GitOps"
                logo: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                subtitle: "Kubernetes Manifests & Applications"
                tag: "gitops"
                url: "https://github.com/mikha-22/homelab-gitops"
                target: "_blank"
              - name: "Homelab IaC"
                logo: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                subtitle: "Infrastructure as Code"
                tag: "infrastructure"
                url: "https://github.com/mikha-22/homelab-iac"
                target: "_blank"
        
        # Welcome message
        message:
          style: "is-dark"
          title: "Welcome to Mikha's Homelab!"
          icon: "fa fa-grin"
          content: "This dashboard provides quick access to all homelab services. Grafana has anonymous viewing enabled for easy demos. ArgoCD demo access: demo/homelab-readonly"

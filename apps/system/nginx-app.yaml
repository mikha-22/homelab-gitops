apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-static
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  sources:
    # Source 1: The official Bitnami NGINX Helm chart
    - repoURL: oci://registry-1.docker.io/bitnamicharts
      targetRevision: 21.0.6  # Latest version
      chart: nginx
      helm:
        releaseName: nginx-static
        valueFiles:
          # This tells Helm to get its values from the 'values' source below
          - $values/apps/nginx/values.yaml
    # Source 2: Your Git repository with values
    - repoURL: https://github.com/mikha-22/homelab-gitops
      targetRevision: HEAD
      ref: values
    
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m

  # Ignore differences in replica count during autoscaling
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # Deploy after monitoring stack
spec:
  project: default
  # OPTION 1: Use multiple sources (requires ArgoCD 2.6+)
  sources:
    # Helm chart source
    - repoURL: https://djjudas21.github.io/charts/
      targetRevision: 8.2.4
      chart: homer
      helm:
        releaseName: homer
        valueFiles:
          - $values/apps/homer/values.yaml
    # Values file source
    - repoURL: https://github.com/mikha-22/homelab-gitops
      targetRevision: HEAD
      ref: values
    
  destination:
    server: https://kubernetes.default.svc
    namespace: homer
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

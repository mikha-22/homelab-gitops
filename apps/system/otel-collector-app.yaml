# apps/otel-collector/values.yaml - FIXED for v0.130.1

# Deploy as DaemonSet to collect logs from all nodes
mode: daemonset

# Use the CONTRIB distribution v0.130.1 (stable version)
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.130.1"

# Enable useful presets that handle k8s configuration automatically
presets:
  # Configures the collector to collect logs (replaces Promtail)
  logsCollection:
    enabled: true
    includeCollectorLogs: false
    storeCheckpoints: true  # Enable checkpoints for reliability
  # Configures the collector to collect host metrics
  hostMetrics:
    enabled: true
  # Adds Kubernetes metadata to all telemetry
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: false
    extractAllPodAnnotations: false
  # Collect kubelet metrics (suitable for daemonset)
  kubeletMetrics:
    enabled: true

# Enable the metrics port for Prometheus scraping
ports:
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# Custom collector configuration (merged with presets)
config:
  receivers:
    # TRACES: Accept traces from applications (keep defaults)
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

  processors:
    # Add resource attributes for consistent labeling
    resource:
      attributes:
        - key: cluster
          value: homelab
          action: upsert
        - key: environment
          value: homelab  
          action: upsert

  exporters:
    # LOGS: Send to Loki via OTLP (loki exporter deprecated!)
    otlphttp/loki:
      endpoint: "http://loki-gateway.monitoring.svc.cluster.local:3100/otlp"
      tls:
        insecure: true

    # TRACES: Send to Tempo  
    otlp/tempo:
      endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

    # METRICS: Use prometheusremotewrite exporter to send to Prometheus
    prometheusremotewrite:
      endpoint: "http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      tls:
        insecure: true
      external_labels:
        cluster: homelab
        environment: homelab

  service:
    pipelines:
      # LOGS pipeline (preset adds filelog receiver automatically)
      logs:
        receivers: [otlp]  # Preset adds filelog
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/loki]

      # METRICS pipeline (preset adds hostmetrics, kubeletstats automatically)  
      metrics:
        receivers: [otlp, prometheus]  # Preset adds hostmetrics, kubeletstats
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [prometheusremotewrite]

      # TRACES pipeline (keep defaults)
      traces:
        receivers: [otlp, jaeger, zipkin]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/tempo]

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Use GOMEMLIMIT for better memory management
useGOMEMLIMIT: true

# Service account with necessary permissions
serviceAccount:
  create: true

# RBAC (presets will add necessary rules automatically)
clusterRole:
  create: true

# ServiceMonitor for Prometheus to scrape OTel collector's own metrics
serviceMonitor:
  enabled: true
  extraLabels:
    release: prometheus-stack
  metricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics

# Pod security context for log file access (required by logsCollection preset)
securityContext:
  runAsUser: 0  # Required for reading log files
  runAsGroup: 0

# Node selector and tolerations for DaemonSet
tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
    operator: Exists
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

# Pod annotations for monitoring
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: "/metrics"

# Additional labels
additionalLabels:
  app.kubernetes.io/part-of: homelab-gitops
  environment: homelab
  component: telemetry-infrastructure

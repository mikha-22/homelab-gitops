# apps/otel-collector/values.yaml - Homelab-Optimized using Chart Schema

# Deploy as DaemonSet to collect logs from all nodes
mode: daemonset

# Use the CORE distribution
image:
  repository: otel/opentelemetry-collector-k8s
  tag: "0.115.0"

# Enable useful presets that handle k8s configuration automatically
presets:
  # Configures the collector to collect logs (replaces Promtail)
  logsCollection:
    enabled: true
    includeCollectorLogs: false
    storeCheckpoints: true  # Enable checkpoints for reliability
  # Configures the collector to collect host metrics
  hostMetrics:
    enabled: true
  # Adds Kubernetes metadata to all telemetry
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: false
    extractAllPodAnnotations: false
  # Collect cluster-level metrics
  clusterMetrics:
    enabled: true

# Custom collector configuration (merged with presets)
config:
  receivers:
    # TRACES: Accept traces from applications
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

  processors:
    # Add resource attributes for consistent labeling
    resource:
      attributes:
        - key: cluster
          value: homelab
          action: upsert
        - key: environment
          value: homelab  
          action: upsert
    # Memory limiting (chart provides defaults based on resources)
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    # Efficient batching
    batch:
      send_batch_size: 1024
      timeout: 5s
      send_batch_max_size: 2048

  exporters:
    # LOGS: Send to Loki (replacing Promtail)
    loki:
      endpoint: "http://loki-gateway.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      default_labels_enabled:
        exporter: false
        job: false
        instance: false

    # TRACES: Send to Tempo  
    otlp/tempo:
      endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

    # METRICS: Expose for Prometheus to scrape
    prometheus:
      endpoint: "${env:MY_POD_IP}:8889"
      const_labels:
        cluster: homelab
        environment: homelab
      send_timestamps: true
      enable_open_metrics: true

  service:
    pipelines:
      # LOGS pipeline (enhanced by logsCollection preset)
      logs:
        receivers: [otlp]  # Preset adds filelog automatically
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [loki]

      # METRICS pipeline (enhanced by hostMetrics + clusterMetrics presets)  
      metrics:
        receivers: [otlp, prometheus]  # Presets add hostmetrics, k8s_cluster automatically
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [prometheus]

      # TRACES pipeline
      traces:
        receivers: [otlp, jaeger, zipkin]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/tempo]

# Enable the metrics port for Prometheus scraping
ports:
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Use GOMEMLIMIT for better memory management
useGOMEMLIMIT: true

# Service account with necessary permissions
serviceAccount:
  create: true
  name: otel-collector

# RBAC (presets will add necessary rules automatically)
clusterRole:
  create: true
  # Additional rules beyond what presets provide
  rules:
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]

# ServiceMonitor for Prometheus to scrape OTel metrics
serviceMonitor:
  enabled: true
  extraLabels:
    release: prometheus-stack
  metricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics

# Pod security context for log file access (required by logsCollection preset)
securityContext:
  runAsUser: 0  # Required for reading log files
  runAsGroup: 0

# Node selector and tolerations for DaemonSet
tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
    operator: Exists
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

# Pod annotations for monitoring
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8889"
  prometheus.io/path: "/metrics"

# Additional labels
additionalLabels:
  app.kubernetes.io/part-of: homelab-gitops
  environment: homelab
  component: telemetry-infrastructure

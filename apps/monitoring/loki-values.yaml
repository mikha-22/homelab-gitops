# Loki Configuration - Chart Version 6.30.1
# Optimized for homelab deployment with latest best practices

# Global configuration
global:
  dnsService: kube-dns
  dnsNamespace: kube-system

# Deployment mode - SingleBinary for homelab efficiency
deploymentMode: SingleBinary

# Loki configuration
loki:
  # Authentication disabled for homelab simplicity
  auth_enabled: false
  
  # Server configuration
  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info
    log_format: logfmt
  
  # Common configuration
  common:
    # Path prefix for object storage (when using cloud storage)
    path_prefix: /var/loki
    # Replication factor
    replication_factor: 1
    # Ring configuration for single binary mode
    ring:
      kvstore:
        store: inmemory
  
  # Storage configuration - filesystem for homelab
  storage_config:
    filesystem:
      directory: /var/loki
    hedging:
      at: 250ms
      max_per_second: 20
      up_to: 3
  
  # Schema configuration
  schema_config:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  
  # Limits configuration
  limits_config:
    # Retention period
    retention_period: 7d
    # Ingestion limits
    ingestion_rate_strategy: global
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_global_streams_per_user: 10000
    max_query_length: 12000h
    max_query_parallelism: 16
    max_streams_per_user: 0
    max_line_size: 256000
    max_entries_limit_per_query: 10000
    max_query_series: 10000
    # Query timeout
    query_timeout: 300s
    # Split queries settings
    split_queries_by_interval: 15m
    max_concurrent_tail_requests: 10
    max_cache_freshness_per_query: 10m
    # Reject old samples
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    # Creation grace period
    creation_grace_period: 10m
    # Enforce metric name validation
    enforce_metric_name: false
    # Max metadata per user
    max_metadata_per_user: 100000
    max_metadata_per_metric: 10
  
  # Analytics configuration
  analytics:
    reporting_enabled: false
  
  # Query scheduler configuration
  query_scheduler:
    max_outstanding_requests_per_tenant: 2048
  
  # Frontend configuration
  frontend:
    max_outstanding_per_tenant: 2048
    compress_responses: true
    log_queries_longer_than: 5s
  
  # Querier configuration
  querier:
    max_concurrent: 16
    query_timeout: 300s
  
  # Query range configuration
  query_range:
    # Results cache configuration
    cache_results: true
    max_retries: 5
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 500
          ttl: 1h
    
  # Table manager configuration (for retention)
  table_manager:
    retention_deletes_enabled: true
    retention_period: 7d
  
  # Compactor configuration
  compactor:
    working_directory: /var/loki/boltdb-shipper-compactor
    shared_store: filesystem
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_cancel_period: 24h

# Single binary specific configuration
singleBinary:
  # Number of replicas
  replicas: 1
  
  # Resource management
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Persistence configuration
  persistence:
    enabled: true
    storageClass: local-path
    size: 30Gi
    accessModes:
      - ReadWriteOnce
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context
  containerSecurityContext:
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
  
  # Liveness probe
  livenessProbe:
    httpGet:
      path: /ready
      port: http-metrics
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3
  
  # Readiness probe
  readinessProbe:
    httpGet:
      path: /ready
      port: http-metrics
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3
  
  # Affinity and tolerations
  affinity: {}
  nodeSelector: {}
  tolerations: []
  
  # Extra environment variables
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
  
  # Extra volumes and volume mounts for temporary directories
  extraVolumes:
    - name: tmp
      emptyDir: {}
    - name: runtime-tmp
      emptyDir: {}
  
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: runtime-tmp
      mountPath: /var/tmp

# Gateway configuration (nginx proxy)
gateway:
  enabled: true
  replicas: 1
  
  # Resource management
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: http
    labels: {}
    annotations: {}
  
  # Ingress configuration - FIXED TO MATCH WORKING PATTERN
  ingress:
    enabled: true
    hosts:
      - host: loki.milenika.dev
        paths:
          - path: /
            pathType: Prefix
    annotations:
      # Use same pattern as ArgoCD and Grafana
      "kubernetes.io/ingress.class": "traefik"
      "external-dns.alpha.kubernetes.io/target": "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
    tls:
      - secretName: loki-gateway-tls
        hosts:
          - loki.milenika.dev

# Test configuration
test:
  enabled: false

# Monitoring configuration
monitoring:
  # Self monitoring disabled to keep things simple
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  
  # Loki canary for synthetic monitoring
  lokiCanary:
    enabled: true
    resources:
      limits:
        cpu: 50m
        memory: 64Mi
      requests:
        cpu: 25m
        memory: 32Mi

# ServiceMonitor for Prometheus integration
serviceMonitor:
  enabled: true
  namespace: monitoring
  namespaceSelector: {}
  annotations: {}
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  relabelings: []
  metricRelabelings: []

# PrometheusRule for alerting
prometheusRule:
  enabled: true
  namespace: monitoring
  annotations: {}
  labels: {}
  groups:
    - name: loki-rules
      rules:
        - alert: LokiProcessTooManyRestarts
          expr: changes(process_start_time_seconds{job=~"loki.*"}[15m]) > 2
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: Loki process too many restarts (instance {{ $labels.instance }})
            description: "A loki process had too many restarts (target {{ $labels.instance }})\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
        
        - alert: LokiRequestErrors
          expr: 100 * sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[1m])) by (namespace, job, route) / sum(rate(loki_request_duration_seconds_count[1m])) by (namespace, job, route) > 10
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Loki request errors (instance {{ $labels.instance }})
            description: "The {{ $labels.job }} and {{ $labels.route }} are experiencing errors\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

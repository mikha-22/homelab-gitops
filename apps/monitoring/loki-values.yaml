# Loki Configuration - Chart Version 6.30.1
# Minimal configuration using mostly defaults

# Deployment mode
deploymentMode: SingleBinary

# Only essential configuration
loki:
  auth_enabled: false

# Single binary configuration
singleBinary:
  replicas: 1
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  persistence:
    enabled: true
    storageClass: local-path
    size: 30Gi

# Gateway for external access
gateway:
  enabled: true
  
  # Fixed ingress configuration
  ingress:
    enabled: true
    hosts:
      - host: loki.milenika.dev
        paths:
          - path: /
            pathType: Prefix
    annotations:
      "kubernetes.io/ingress.class": "traefik"
      "external-dns.alpha.kubernetes.io/target": "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
    tls:
      - secretName: loki-gateway-tls
        hosts:
          - loki.milenika.dev

# Disable test
test:
  enabled: false

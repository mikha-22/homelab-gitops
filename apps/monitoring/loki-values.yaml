# Loki Configuration - Chart Version 6.30.1
# Minimal configuration to avoid template errors

# Deployment mode
deploymentMode: SingleBinary

# Basic Loki configuration
loki:
  auth_enabled: false
  
  # Server configuration
  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info
  
  # Pattern ingester (required by chart)
  pattern_ingester:
    enabled: false
  
  # Tracing configuration (required by chart)
  tracing:
    enabled: false
  
  # Basic schema configuration
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  
  # Storage configuration (minimal)
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  
  # Limits configuration
  limits_config:
    retention_period: 7d
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_length: 12000h
    max_query_parallelism: 16
    query_timeout: 300s
    reject_old_samples: true
    reject_old_samples_max_age: 168h
  
  # Common configuration
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory

# Single binary configuration
singleBinary:
  replicas: 1
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  persistence:
    enabled: true
    storageClass: local-path
    size: 30Gi
    accessModes:
      - ReadWriteOnce
  
  extraVolumes:
    - name: tmp
      emptyDir: {}
  
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

# Gateway configuration
gateway:
  enabled: true
  
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  # Fixed ingress configuration
  ingress:
    enabled: true
    hosts:
      - host: loki.milenika.dev
        paths:
          - path: /
            pathType: Prefix
    annotations:
      "kubernetes.io/ingress.class": "traefik"
      "external-dns.alpha.kubernetes.io/target": "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
    tls:
      - secretName: loki-gateway-tls
        hosts:
          - loki.milenika.dev

# Disable unnecessary components
test:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

ruler:
  enabled: false

tableManager:
  retention_deletes_enabled: true
  retention_period: 7d

# Monitoring
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# ArgoCD Demo Account - Read Only Access
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Demo user permissions - READ ONLY
    p, role:demo, applications, get, *, allow
    p, role:demo, projects, get, *, allow
    p, role:demo, repositories, get, *, allow
    p, role:demo, clusters, get, *, allow
    p, role:demo, certificates, get, *, allow
    p, role:demo, gpgkeys, get, *, allow
    
    # Explicitly deny all write operations
    p, role:demo, applications, create, *, deny
    p, role:demo, applications, update, *, deny
    p, role:demo, applications, delete, *, deny
    p, role:demo, applications, sync, *, deny
    p, role:demo, applications, action/*, *, deny
    p, role:demo, applications, override, *, deny
    
    p, role:demo, projects, create, *, deny
    p, role:demo, projects, update, *, deny
    p, role:demo, projects, delete, *, deny
    
    p, role:demo, repositories, create, *, deny
    p, role:demo, repositories, update, *, deny
    p, role:demo, repositories, delete, *, deny
    
    # Assign demo user to demo role
    g, demo, role:demo

---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  # Demo user account - password: "homelab-readonly"
  # Generated with: htpasswd -nbBC 10 "" "homelab-readonly" | tr -d ':\n' | sed 's/$2y/$2a/'
  accounts.demo: "$2a$10$rRyBsGw/1cHPKyInIwbNOeR8tK2N7X8.P5vK9Y8Q6H1mW7P2vN1Fe"
  accounts.demo.enabled: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Enable demo account
  accounts.demo: "login"
  accounts.demo.enabled: "true"

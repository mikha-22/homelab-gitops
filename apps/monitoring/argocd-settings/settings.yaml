# ArgoCD Anonymous Access Configuration - Read Only
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Enable anonymous access
  users.anonymous.enabled: "true"
  # URL configuration for proper redirects
  url: "https://argocd.milenika.dev"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # BEST PRACTICE: Set the default policy to a dedicated, restricted role for anonymous users.
  policy.default: role:anonymous
  policy.csv: |
    # Define a new role for anonymous users.
    # Grant this role read-only access ONLY to applications and projects.
    p, role:anonymous, applications, get, */*, allow
    p, role:anonymous, projects, get, *, allow

    # Explicitly deny access to everything else for this role for maximum security.
    p, role:anonymous, repositories, *, *, deny
    p, role:anonymous, certificates, *, *, deny
    p, role:anonymous, gpgkeys, *, *, deny
    p, role:anonymous, clusters, get, *, deny
    p, role:anonymous, applications, create, */*, deny
    p, role:anonymous, applications, update, */*, deny
    p, role:anonymous, applications, delete, */*, deny
    p, role:anonymous, applications, sync, */*, deny
    p, role:anonymous, applications, action/*, */*, deny

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Server configurations
  server.insecure: "false"
  # Disable internal TLS since we're using Traefik
  server.grpc.web: "true"

---
# ArgoCD Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/target: "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Important: Enable gRPC for ArgoCD
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.options: default
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.milenika.dev
      secretName: argocd-server-tls
  rules:
    - host: argocd.milenika.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80

---
# Additional Ingress for gRPC (if needed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-grpc-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/target: "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    # gRPC configuration
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.milenika.dev
      secretName: argocd-server-tls
  rules:
    - host: argocd.milenika.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
---
# Restore the essential argocd-secret
# This secret is required for the ArgoCD server to operate.
# It does not contain user data, allowing anonymous access to work as configured.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
# stringData will be populated by ArgoCD's controller
# A placeholder is sufficient to create the secret
stringData:
  admin.password: ""
  server.secretkey: ""

# FILE: apps/monitoring/kube-prometheus-stack-values.yaml
# This chart installs Prometheus, Grafana, and Alertmanager.
# We will disable Alertmanager to keep it simple.

alertmanager:
  enabled: false

grafana:
  enabled: true
  # Let the chart manage the admin password.
  # You can retrieve the initial password with:
  # kubectl get secret --namespace monitoring kube-prometheus-stack-grafana -o jsonpath="{.data.admin-password}" | base64 --decode ; echo
  adminPassword: "prom-operator" # Default, but will be randomly generated if not set

  persistence:
    enabled: true
    storageClassName: "local-path" # Make sure this storage class exists
    size: 10Gi
  
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts: 
      - "grafana.milenika.dev"
    annotations:
      # CORRECT: Using the tunnel CNAME from your terraform output
      external-dns.alpha.kubernetes.io/target: "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  
  # Pre-configure datasources in Grafana
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false
    # UPDATED: Added Prometheus as the default datasource
    - name: Prometheus
      type: prometheus
      # This URL points to the service created by this very chart
      url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      access: proxy
      isDefault: true

prometheus:
  enabled: true
  prometheusSpec:
    retention: 5d # Keep a reasonable retention for a homelab
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# FILE: apps/monitoring/homelab/kustomization.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This directly renders the Helm charts using local values files,
# which is simpler and avoids the pathing errors from nested Applications.

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 58.1.0 # Pinning the chart version for stability
    releaseName: kube-prometheus-stack
    namespace: monitoring
    # Kustomize will correctly find this values file in the same directory
    valuesFile: ./kube-prometheus-stack-values.yaml

  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.6.1 # Pinning the chart version for stability
    releaseName: loki
    namespace: monitoring
    # Kustomize will correctly find this values file in the same directory
    valuesFile: ./loki-values.yaml

# FILE: apps/monitoring/homelab/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Add namespace for all resources
namespace: monitoring

# Resources section
resources:
  - grafana-secret.yaml

# Helm charts configuration
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 58.1.0
    releaseName: kube-prometheus-stack
    # FIX: Removed redundant namespace key
    valuesFile: kube-prometheus-stack-values.yaml
    includeCRDs: true

  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.6.1
    releaseName: loki
    # FIX: Removed redundant namespace key
    valuesFile: loki-values.yaml
    includeCRDs: true

# Use the new 'labels' field instead of deprecated 'commonLabels'
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: monitoring-stack

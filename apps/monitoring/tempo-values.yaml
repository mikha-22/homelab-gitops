# Tempo Configuration - Chart Version 1.23.2
# Updated for Tempo 2.8+ compatibility

# Global configuration
global:
  image:
    # Use Tempo 2.8 (latest stable)
    tag: "2.8.0"

# Tempo configuration
tempo:
  # Repository configuration
  repository: grafana/tempo
  tag: null
  pullPolicy: IfNotPresent
  
  # Resource management
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Updated configuration for Tempo 2.8+
  config: |
    multitenancy_enabled: false
    usage_report:
      reporting_enabled: false
    compactor:
      compaction:
        block_retention: 1h
    distributor:
      receivers:
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
        opencensus:
          endpoint: 0.0.0.0:55678
    ingester:
      max_block_duration: 5m
    server:
      http_listen_port: 3200  # Default port changed from 3100 to 3200 in v2.x
      log_level: info
    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
        pool:
          max_workers: 100
          queue_depth: 10000
    querier:
      frontend_worker:
        frontend_address: tempo-query-frontend:9095
    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
      trace_by_id:
        duration_slo: 5s
    # Updated overrides format for v2.8+
    overrides:
      defaults:
        metrics_generator:
          processors: []

# Persistence configuration
persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 10Gi

# Service configuration
service:
  type: ClusterIP
  ports:
    # Tempo HTTP API (updated default port)
    - name: tempo-prom-metrics
      port: 3200
      targetPort: 3200
    # Jaeger receivers
    - name: tempo-jaeger-thrift-http
      port: 14268
      targetPort: 14268
    - name: tempo-jaeger-grpc
      port: 14250
      targetPort: 14250
    - name: tempo-jaeger-thrift-binary
      port: 6832
      targetPort: 6832
      protocol: UDP
    - name: tempo-jaeger-thrift-compact
      port: 6831
      targetPort: 6831
      protocol: UDP
    # Zipkin receiver
    - name: tempo-zipkin
      port: 9411
      targetPort: 9411
    # OpenTelemetry receivers
    - name: tempo-otlp-legacy
      port: 55680
      targetPort: 55680
    - name: tempo-otlp-http
      port: 4318
      targetPort: 4318
    - name: tempo-otlp-grpc
      port: 4317
      targetPort: 4317
    # OpenCensus receiver
    - name: tempo-opencensus
      port: 55678
      targetPort: 55678

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # Tempo needs to write to filesystem
  allowPrivilegeEscalation: false

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# ServiceMonitor for Prometheus integration
serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels: {}
  annotations: {}

# Ingress configuration (optional, for external access)
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: tempo.milenika.dev
      paths:
        - path: /
          pathType: Prefix
  annotations:
    # Cloudflare tunnel configuration
    external-dns.alpha.kubernetes.io/target: "0051fa80-d5c3-4095-b44f-a8f6e77f404f.cfargotunnel.com"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    # Security headers
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "monitoring-security-headers@kubernetescrd"
  tls:
    - secretName: tempo-tls
      hosts:
        - tempo.milenika.dev

# Extra volumes for temporary storage
extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

# Node selector and tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# Replica count
replicas: 1

# Update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Probes (updated paths for v2.8+)
readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 30
  periodSeconds: 15

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3200"
  prometheus.io/path: "/metrics"

# Prometheus Stack Configuration - PROMETHEUS + GRAFANA ONLY
# Chart Version: 75.9.0
# SIMPLIFIED SECURITY CONTEXTS

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# CRDs configuration
crds:
  enabled: true

# Disable AlertManager for simplified homelab setup
alertmanager:
  enabled: false

# Grafana Configuration - SIMPLIFIED SECURITY
grafana:
  enabled: true
  
  # Admin credentials - will use generated password
  adminUser: admin
  
  # Persistence
  persistence:
    enabled: true
    type: pvc
    storageClassName: ""  # Use default storage class
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  
  # Resource management
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # SIMPLIFIED security context - remove problematic fields
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
  
  # DISABLE INGRESS FOR NOW
  ingress:
    enabled: false
  
  # Data sources configuration - PROMETHEUS ONLY
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
      access: proxy
      isDefault: true
      jsonData:
        timeInterval: 30s
        queryTimeout: 60s
        httpMethod: POST
  
  # Grafana configuration - MINIMAL
  grafana.ini:
    server:
      root_url: http://localhost:3000
    security:
      disable_gravatar: true
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      mode: console
      level: info

# Prometheus Configuration - SIMPLIFIED SECURITY
prometheus:
  enabled: true
  
  prometheusSpec:
    # Data retention
    retention: 15d
    retentionSize: 20GB
    
    # Resource management
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
    
    # SIMPLIFIED security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
    
    # Storage - use default storage class
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ""  # Use default
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
    
    # Service discovery and monitoring
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    
    # Scrape configuration
    scrapeInterval: 30s
    evaluationInterval: 30s

# Prometheus Operator - SIMPLIFIED SECURITY
prometheusOperator:
  enabled: true
  
  # Resource management
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # SIMPLIFIED security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534

# Node Exporter
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 100Mi
    requests:
      cpu: 100m
      memory: 50Mi

# Kube State Metrics  
kubeStateMetrics:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Default monitoring rules
defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Cleanup settings
cleanPrometheusOperatorObjectNames: true

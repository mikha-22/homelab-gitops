# Updated Grafana section for prometheus-stack-values.yaml
# Replace only the grafana: section with this

grafana:
  enabled: true
  
  # Admin credentials - will use generated password
  adminUser: admin
  
  # DISABLE the problematic init container
  initChownData:
    enabled: false
  
  # Persistence
  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  
  # Resource management
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # SIMPLIFIED security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
  
  # CORRECTED INGRESS CONFIGURATION
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      "external-dns.alpha.kubernetes.io/target": "eb69efc6-2d0f-424d-a170-53a8c30c65b7.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
    hosts:
      - grafana.milenika.dev
    path: /
    pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.milenika.dev
  
  # Grafana configuration with DEFAULT DASHBOARD REDIRECT
  grafana.ini:
    server:
      root_url: "https://grafana.milenika.dev"
      serve_from_sub_path: false
    security:
      disable_gravatar: true
      cookie_secure: true
      cookie_samesite: "strict"
      strict_transport_security: true
      x_content_type_options: true
      x_xss_protection: true
    auth:
      disable_login_form: false
      disable_signout_menu: false
    "auth.anonymous":
      enabled: true
      org_name: "Main Org."
      org_role: "Viewer"
      hide_version: true
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      mode: "console"
      level: "info"
    panels:
      disable_sanitize_html: false
    # REDIRECT TO HOMELAB DASHBOARD
    dashboards:
      default_home_dashboard_path: "/var/lib/grafana/dashboards/homelab-overview.json"
    users:
      # Set default dashboard for anonymous users
      home_page: "dashboard"
      default_theme: "dark"

  # ADDITIONAL DATASOURCES FOR LGTM STACK - CONFIGURED VIA GITOPS!
  additionalDataSources:
    # Loki for Logs
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      version: 1
      editable: true
      jsonData:
        # Enable trace to logs correlation
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "trace[_-]?id[\"\\s:=]+([a-fA-F0-9]+)"
            name: TraceID
            url: "$${__value.raw}"
        
    # Tempo for Traces  
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      uid: tempo
      isDefault: false
      version: 1
      editable: true
      jsonData:
        # Enable trace to logs correlation
        tracesToLogs:
          datasourceUid: loki
          tags: ['job', 'instance', 'pod', 'namespace']
          mappedTags: [
            { key: 'service.name', value: 'service' },
            { key: 'service.namespace', value: 'namespace' }
          ]
          mapTagNamesEnabled: false
          spanStartTimeShift: '1h'
          spanEndTimeShift: '1h'
        # Enable service map
        serviceMap:
          datasourceUid: prometheus
        # Enable node graph
        nodeGraph:
          enabled: true
        # Search configuration
        search:
          hide: false
        # Loki search
        lokiSearch:
          datasourceUid: loki

  # Sidecar configuration for automatic dashboard/datasource discovery
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true
        # Set homelab dashboard as default
        defaultFolderName: "General"
    datasources:
      enabled: true
      searchNamespace: ALL
      label: grafana_datasource
      labelValue: "1"
      # IMPORTANT: Don't mark any additional datasource as default
      # The Prometheus datasource from the chart is already default
      defaultDatasourceEnabled: true

  # DEFAULT DASHBOARD PROVISIONING
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: false
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards

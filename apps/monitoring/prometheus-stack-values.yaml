# Fixed Grafana Configuration Section for prometheus-stack-values.yaml
# This replaces the existing grafana section in your file

grafana:
  enabled: true
  
  # Admin credentials - will use generated password
  adminUser: admin
  
  # DISABLE the problematic init container
  initChownData:
    enabled: false
  
  # Persistence
  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  
  # Resource management
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # SIMPLIFIED security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
  
  # CORRECTED INGRESS CONFIGURATION - This is the key fix!
  ingress:
    enabled: true
    # Use ingressClassName instead of annotations for Traefik
    ingressClassName: traefik
    annotations:
      "external-dns.alpha.kubernetes.io/target": "eb69efc6-2d0f-424d-a170-53a8c30c65b7.cfargotunnel.com"
      "external-dns.alpha.kubernetes.io/cloudflare-proxied": "true"
      # REMOVED the problematic traefik.ingress.kubernetes.io/router.tls annotation
    hosts:
      - grafana.milenika.dev
    path: /
    pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.milenika.dev
  
  # Grafana configuration
  grafana.ini:
    server:
      root_url: "https://grafana.milenika.dev"
      serve_from_sub_path: false
    security:
      disable_gravatar: true
      cookie_secure: true
      cookie_samesite: "strict"
      strict_transport_security: true
      x_content_type_options: true
      x_xss_protection: true
    auth:
      disable_login_form: false
      disable_signout_menu: false
    "auth.anonymous":
      enabled: true
      org_name: "Main Org."
      org_role: "Viewer"
      hide_version: true
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      mode: "console"
      level: "info"
    panels:
      disable_sanitize_html: false

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml  # Remove the ../  - file should be moved to this directory
  - security-headers.yaml

# Fix deprecated commonLabels warning - use labels instead
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: homelab-gitops
      environment: homelab

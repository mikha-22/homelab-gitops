apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yaml

helmCharts:
  # Prometheus Stack - Metrics collection and alerting
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: "75.9.0"
    releaseName: prometheus-stack
    valuesFile: prometheus-stack-values.yaml
    namespace: monitoring

  # Loki - Log aggregation
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: "6.30.1"
    releaseName: loki
    valuesFile: loki-values.yaml
    namespace: monitoring

  # Tempo - Distributed tracing
  - name: tempo
    repo: https://grafana.github.io/helm-charts
    version: "1.17.3"
    releaseName: tempo
    valuesFile: tempo-values.yaml
    namespace: monitoring

  # Promtail - Log collection (connects to both Loki and Tempo)
  - name: promtail
    repo: https://grafana.github.io/helm-charts
    version: "6.17.0"
    releaseName: promtail
    valuesFile: promtail-values.yaml
    namespace: monitoring

# Common labels for all monitoring components
commonLabels:
  app.kubernetes.io/part-of: lgtm-stack
  environment: homelab
  managed-by: argocd

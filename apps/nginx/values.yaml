# NGINX Configuration for Hugo Static Site Hosting via MinIO
# Based on Bitnami NGINX Helm Chart v21.0.6 (Latest)
# FIXED: Root path handling for Hugo static sites

## Global Docker image parameters
image:
  registry: docker.io
  repository: bitnami/nginx
  tag: 1.27.3-debian-12-r1  # Latest stable NGINX 1.27.3
  pullPolicy: IfNotPresent
  pullSecrets: []

## Force target Kubernetes version (to silence chart warnings)
kubeVersion: ""

## String to partially override nginx.fullname
nameOverride: ""
fullnameOverride: ""

## Deployment pod host aliases
## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
hostAliases: []

## Number of nginx replicas to deploy
replicaCount: 2

## Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

## Pod Management Policy
## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#pod-management-policies
podManagementPolicy: Parallel

## Pod Disruption Budget configuration
pdb:
  create: true
  minAvailable: 1

## Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
  targetMemory: 80

## Custom server block for proxying to MinIO - FIXED FOR ROOT PATH
serverBlock: |-
  # Upstream for MinIO S3 API
  upstream minio_s3 {
      server minio.minio.svc.cluster.local:9000;
      keepalive 32;
  }
  
  # Map for setting correct Content-Type for static assets
  map $uri $content_type_override {
      ~*\.js$     "application/javascript; charset=utf-8";
      ~*\.css$    "text/css; charset=utf-8";
      ~*\.html$   "text/html; charset=utf-8";
      ~*\.json$   "application/json; charset=utf-8";
      ~*\.xml$    "application/xml; charset=utf-8";
      ~*\.ico$    "image/x-icon";
      ~*\.png$    "image/png";
      ~*\.jpg$    "image/jpeg";
      ~*\.jpeg$   "image/jpeg";
      ~*\.gif$    "image/gif";
      ~*\.svg$    "image/svg+xml";
      ~*\.woff$   "font/woff";
      ~*\.woff2$  "font/woff2";
      ~*\.ttf$    "font/ttf";
      default     "";
  }
  
  server {
      listen 8080;
      server_name _;
      
      # Security headers
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      
      # Gzip compression for better performance
      gzip on;
      gzip_vary on;
      gzip_min_length 1024;
      gzip_types
          text/plain
          text/css
          text/xml
          text/javascript
          application/javascript
          application/json
          application/xml+rss
          application/atom+xml
          image/svg+xml;
      
      # FIXED: Root location with proper Hugo site handling
      location / {
          # Set variables for dynamic proxying
          set $s3_bucket "hugo-static";
          set $s3_path $uri;
          
          # Handle root path - serve index.html
          if ($uri = "/") {
              set $s3_path "/index.html";
          }
          
          # Handle directory paths - try index.html in that directory
          if ($uri ~ "^(.+)/$") {
              set $s3_path "$1/index.html";
          }
          
          # Proxy to MinIO with proper path
          proxy_pass http://minio_s3/$s3_bucket$s3_path;
          
          # Handle 404 from MinIO - try alternative paths
          error_page 404 = @fallback;
          
          # Proxy headers
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          
          # HTTP/1.1 for keepalive
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          
          # Timeouts
          proxy_connect_timeout 10s;
          proxy_send_timeout 30s;
          proxy_read_timeout 30s;
          
          # Intercept MinIO errors to avoid XML responses
          proxy_intercept_errors on;
          
          # Cache static assets
          location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
              proxy_pass http://minio_s3/hugo-static$uri;
              
              # Override Content-Type if needed
              add_header Content-Type $content_type_override always;
              
              # Cache headers
              expires 30d;
              add_header Cache-Control "public, no-transform, immutable";
              add_header Vary "Accept-Encoding";
              
              # Same proxy headers
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              
              # Don't intercept errors for assets
              proxy_intercept_errors off;
          }
          
          # Special handling for HTML files
          location ~* \.html$ {
              proxy_pass http://minio_s3/hugo-static$uri;
              
              # No caching for HTML files
              expires -1;
              add_header Cache-Control "no-cache, no-store, must-revalidate";
              add_header Pragma "no-cache";
              
              # Same proxy headers
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              
              # Don't intercept errors for HTML
              proxy_intercept_errors off;
          }
      }
      
      # Fallback location for 404 handling
      location @fallback {
          # Try common Hugo patterns
          set $fallback_path "";
          
          # If requesting a directory, try index.html
          if ($uri ~ "^(.+)$") {
              set $fallback_path "$1/index.html";
          }
          
          proxy_pass http://minio_s3/hugo-static$fallback_path;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          
          # If this also fails, return 404
          proxy_intercept_errors off;
      }
      
      # Health check endpoint
      location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
      }
      
      # Nginx status for monitoring
      location /nginx_status {
          stub_status on;
          access_log off;
          allow 127.0.0.1;
          allow 10.0.0.0/8;
          allow 172.16.0.0/12;
          allow 192.168.0.0/16;
          deny all;
      }
      
      # Custom 404 page
      error_page 404 /404.html;
      location = /404.html {
          proxy_pass http://minio_s3/hugo-static/404.html;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          internal;
      }
  }

## Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

## Disable custom probes - let chart use defaults
livenessProbe:
  enabled: false

## Disable custom readiness probe  
readinessProbe:
  enabled: false

## Disable custom startup probe
startupProbe:
  enabled: false

## Custom startup probe
customStartupProbe: {}
customLivenessProbe: {}
customReadinessProbe: {}

## Pod Security Context
podSecurityContext:
  enabled: true
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

## Container Security Context
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

## Service parameters
service:
  type: ClusterIP
  ports:
    http: 80
  targetPort:
    http: http

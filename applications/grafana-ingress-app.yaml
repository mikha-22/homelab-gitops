# applications/grafana-ingress-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-ingress
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: 'https://github.com/mikha-22/homelab-gitops.git'
    targetRevision: HEAD
    # CORRECTED: Pointing to the specific 'grafana' subdirectory
    path: manifests/grafana
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  # CORRECTED: The syncPolicy is now properly formatted YAML
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

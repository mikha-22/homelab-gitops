# ===================================================================
#  BOOTSTRAP APPLICATION FOR HOMELAB GITOPS
#  This creates the root ArgoCD Application that manages all other apps
#  from your mikha-22/homelab-gitops repository
# ===================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # Source: Your GitOps repository
  source:
    repoURL: https://github.com/mikha-22/homelab-gitops
    targetRevision: HEAD
    path: applications  # This is where you'll put your ArgoCD Application manifests
    
  # Destination: This K3s cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Sync Policy - automatically sync changes from Git
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# Optional: Create a dedicated project for better organization
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
spec:
  description: Homelab Applications Project
  
  # Source repositories
  sourceRepos:
  - 'https://github.com/mikha-22/homelab-gitops'
  - 'https://charts.bitnami.com/bitnami'
  - 'https://kubernetes-sigs.github.io/external-dns/'
  - 'https://prometheus-community.github.io/helm-charts'
  - 'https://grafana.github.io/helm-charts'
  - 'https://kubernetes.github.io/ingress-nginx'
  - 'https://helm.releases.hashicorp.com'
  - 'https://charts.jetstack.io'
  - '*'  # Allow all repos for flexibility
  
  # Destination clusters and namespaces
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
    
  # Cluster resource allow list
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: ''
    kind: ClusterRole
  - group: ''
    kind: ClusterRoleBinding
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRole
  - group: 'rbac.authorization.k8s.io' 
    kind: ClusterRoleBinding
  - group: 'apiextensions.k8s.io'
    kind: CustomResourceDefinition
  - group: 'admissionregistration.k8s.io'
    kind: MutatingAdmissionWebhook
  - group: 'admissionregistration.k8s.io'
    kind: ValidatingAdmissionWebhook
  - group: 'networking.k8s.io'
    kind: NetworkPolicy
  - group: 'policy'
    kind: PodSecurityPolicy
    
  # Namespace resource allow list
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
